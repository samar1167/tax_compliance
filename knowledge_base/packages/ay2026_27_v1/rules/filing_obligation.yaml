rules:
  - rule_id: "OBL_001"
    module: "filing_obligation"
    title: "Total income exceeds basic exemption limit"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 100
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required: ["income.total_income", "context.basic_exemption_limit"]
    when:
      gt:
        left: "income.total_income"
        right: "context.basic_exemption_limit"
    effect:
      decision_updates:
        - path: "filing_obligation"
          operation: "set"
          value: "required"
        - path: "filing_obligation_reasons"
          operation: "append"
          value: "TOTAL_INCOME_ABOVE_BASIC_EXEMPTION"
      reason_code: "TOTAL_INCOME_ABOVE_BASIC_EXEMPTION"
      severity: "info"
      terminal: false
    explanation_template: "Total income exceeds the applicable basic exemption limit."
    source_refs:
      - source_id: "sec139"
        label: "Section 139(1)"
        url: "https://incometaxindia.gov.in/Acts/Income-tax%20Act%2C%201961/2025/102120000000091167.htm"
        authority_type: "statute"
        notes: "Main filing obligation."

  - rule_id: "OBL_002"
    module: "filing_obligation"
    title: "Income exceeds threshold before specified exemptions and Chapter VI-A deductions"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 101
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "income.total_income_before_specified_exemptions_and_chapter_via"
      - "context.basic_exemption_limit"
    when:
      gt:
        left: "income.total_income_before_specified_exemptions_and_chapter_via"
        right: "context.basic_exemption_limit"
    effect:
      decision_updates:
        - path: "filing_obligation"
          operation: "set"
          value: "required"
        - path: "filing_obligation_reasons"
          operation: "append"
          value: "PRE_DEDUCTION_INCOME_ABOVE_BASIC_EXEMPTION"
      reason_code: "PRE_DEDUCTION_INCOME_ABOVE_BASIC_EXEMPTION"
      severity: "info"
      terminal: false
    explanation_template: "Income before specified exemptions and Chapter VI-A deductions exceeds the basic exemption limit."
    source_refs:
      - source_id: "sec139"
        label: "Section 139(1) later proviso"
        url: "https://incometaxindia.gov.in/Acts/Income-tax%20Act%2C%201961/2025/102120000000091167.htm"
        authority_type: "statute"
        notes: "Requires filing without giving effect to specified exemptions and Chapter VI-A."

  - rule_id: "OBL_003"
    module: "filing_obligation"
    title: "Resident with foreign asset or foreign signing authority must file"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 110
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "profile.has_foreign_asset"
      - "profile.has_foreign_signing_authority"
      - "profile.is_beneficiary_of_foreign_asset"
    when:
      any:
        - is_true: "profile.has_foreign_asset"
        - is_true: "profile.has_foreign_signing_authority"
        - is_true: "profile.is_beneficiary_of_foreign_asset"
    effect:
      decision_updates:
        - path: "filing_obligation"
          operation: "set"
          value: "required"
        - path: "filing_obligation_reasons"
          operation: "append"
          value: "FOREIGN_ASSET_OR_SIGNING_AUTHORITY_TRIGGER"
      reason_code: "FOREIGN_ASSET_OR_SIGNING_AUTHORITY_TRIGGER"
      severity: "info"
      terminal: false
    explanation_template: "A resident holding foreign assets, foreign signing authority, or certain beneficiary interests must file a return."
    source_refs:
      - source_id: "sec139"
        label: "Section 139(1) foreign asset proviso"
        url: "https://incometaxindia.gov.in/Acts/Income-tax%20Act%2C%201961/2025/102120000000091167.htm"
        authority_type: "statute"
        notes: "Applies to resident other than not ordinarily resident."

