      - "income.total_income_before_specified_exemptions_and_chapter_via"
      - "context.basic_exemption_limit"
    when:
      gt:
        left: "income.total_income_before_specified_exemptions_and_chapter_via"
        right: "context.basic_exemption_limit"
    effect:
      decision_updates:
        - path: "filing_obligation"
