  - rule_id: "OBL_009"
    module: "filing_obligation"
    title: "Aggregate TDS/TCS exceeds Rule 12AB threshold"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 130
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "profile.age_on_previous_year_end"
      - "profile.residential_status"
      - "specified_triggers.aggregate_tds_tcs"
    when:
      any:
        - all:
            - gte:
                left: "profile.age_on_previous_year_end"
                right: 60
            - eq:
                left: "profile.residential_status"
                right: "resident_ordinary"
            - gte:
                left: "specified_triggers.aggregate_tds_tcs"
                right: 50000
        - all:
            - lt:
                left: "profile.age_on_previous_year_end"
                right: 60
            - gte:
                left: "specified_triggers.aggregate_tds_tcs"
                right: 25000
        - all:
            - ne:
                left: "profile.residential_status"
                right: "resident_ordinary"
            - gte:
                left: "specified_triggers.aggregate_tds_tcs"
                right: 25000
    effect:
      decision_updates:
        - path: "filing_obligation"
          operation: "set"
          value: "required"
        - path: "filing_obligation_reasons"
          operation: "append"
          value: "AGGREGATE_TDS_TCS_ABOVE_RULE12AB_THRESHOLD"
      reason_code: "AGGREGATE_TDS_TCS_ABOVE_RULE12AB_THRESHOLD"
      severity: "info"
      terminal: false
    explanation_template: "Aggregate TDS/TCS exceeded the Rule 12AB filing trigger threshold."
    source_refs:
      - source_id: "rule12ab"
        label: "Rule 12AB"
        url: "https://incometaxindia.gov.in/Rules/Income-Tax%20Rules/103520000000090150.htm"
        authority_type: "rule"
        notes: "Rs. 25,000 general threshold; Rs. 50,000 for resident individuals aged 60 or more."

