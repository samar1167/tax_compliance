            left: "income.other_capital_gains_amount"
            right: 0
        - gt:
            left: "income.ltcg_112a_amount"
            right: 125000
        - gt:
            left: "income.house_property_count"
            right: 1
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "DISALLOWED_INCOME_HEAD_FOR_ITR1"
      reason_code: "DISALLOWED_INCOME_HEAD_FOR_ITR1"
      severity: "info"
      terminal: false
    explanation_template: "ITR-1 cannot be used for business/profession income, disallowed capital gains, or more than one house property."
    source_refs:
      - source_id: "itr1_help"
        label: "How to file ITR-1"
        url: "https://www.incometax.gov.in/iec/foportal/help/how-to-file-itr1-form-sahaj"
        authority_type: "official_guidance"
        notes: "Income-head and house-property exclusions."
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "STCG and 112A threshold exclusions."

  - rule_id: "ITR1_EXCL_004"
    module: "itr_selection"
    title: "Exclude ITR-1 for director, unlisted shares, 194N, deferred ESOP, or carry-forward losses"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 213
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "profile.is_director_in_company"
      - "profile.held_unlisted_equity_shares"
      - "profile.tds_under_194n"
      - "profile.has_deferred_esop_tax"
      - "income.brought_forward_loss_exists"
      - "income.loss_to_carry_forward_exists"
    when:
      any:
        - is_true: "profile.is_director_in_company"
        - is_true: "profile.held_unlisted_equity_shares"
        - is_true: "profile.tds_under_194n"
        - is_true: "profile.has_deferred_esop_tax"
        - is_true: "income.brought_forward_loss_exists"
        - is_true: "income.loss_to_carry_forward_exists"
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "ITR1_STATUTORY_EXCLUSION_FLAG"
      reason_code: "ITR1_STATUTORY_EXCLUSION_FLAG"
      severity: "info"
      terminal: false
    explanation_template: "ITR-1 cannot be used for directors, holders of unlisted equity shares, section 194N cases, deferred ESOP tax cases, or carry-forward loss cases."
    source_refs:
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "Current portal exclusions."
      - source_id: "itr1_manual"
        label: "ITR-1 manual"
        url: "https://www.incometax.gov.in/iec/foportal/node/11455"
        authority_type: "official_guidance"
        notes: "Parallel exclusion list."

  - rule_id: "ITR2_ELIG_001"
    module: "itr_selection"
    title: "Route to ITR-2 when not eligible for ITR-1 and no business/profession income exists"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 300
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "decision.itr1_eligible"
      - "income.business_or_profession_income"
      - "income.partnership_firm_interest_salary_bonus_commission"
    when:
      all:
        - eq:
            left: "decision.itr1_eligible"
            right: false
        - eq:
            left: "income.business_or_profession_income"
            right: 0
        - eq:
            left: "income.partnership_firm_interest_salary_bonus_commission"
            right: 0
    effect:
      decision_updates:
        - path: "eligible_forms"
          operation: "append_unique"
          value: "ITR-2"
        - path: "recommended_form"
          operation: "set"
          value: "ITR-2"
      reason_code: "ITR2_SELECTED"
      severity: "info"
      terminal: false
    explanation_template: "The taxpayer is not eligible for ITR-1 and has no business or profession income, so ITR-2 applies."
    source_refs:
      - source_id: "itr2_help"
        label: "ITR-2 help"
        url: "https://www.incometax.gov.in/iec/foportal/help/all-topics/e-filing-services/itr-2"
        authority_type: "official_guidance"
        notes: "ITR-2 applies where ITR-1 is not available and business/profession income is absent."
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "Current AY 2026-27 portal guidance."
