rules:
  - rule_id: "ITR1_ELIG_001"
    module: "itr_selection"
    title: "Base positive eligibility for ITR-1"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 200
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "profile.person_type"
      - "profile.residential_status"
      - "income.total_income"
      - "income.house_property_count"
      - "income.agricultural_income"
      - "income.ltcg_112a_amount"
      - "income.business_or_profession_income"
      - "income.short_term_capital_gains"
      - "income.other_capital_gains_amount"
    when:
      all:
        - eq:
            left: "profile.person_type"
            right: "individual"
        - eq:
            left: "profile.residential_status"
            right: "resident_ordinary"
        - lte:
            left: "income.total_income"
            right: 5000000
        - lte:
            left: "income.house_property_count"
            right: 1
        - lte:
            left: "income.agricultural_income"
            right: 5000
        - lte:
            left: "income.ltcg_112a_amount"
            right: 125000
        - eq:
            left: "income.business_or_profession_income"
            right: 0
        - eq:
            left: "income.short_term_capital_gains"
            right: 0
        - eq:
            left: "income.other_capital_gains_amount"
            right: 0
    effect:
      decision_updates:
        - path: "eligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: true
      reason_code: "ITR1_BASE_ELIGIBLE"
      severity: "info"
      terminal: false
    explanation_template: "The taxpayer satisfies the base resident-individual, income-head, and threshold conditions for ITR-1."
    status: "active"
    rule_type: "eligibility"
    bundle_code: ""
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields: []
    produces_decision_fields:
      - "decision.itr1_eligible"
    source_refs:
      - source_id: "itr1_manual"
        label: "ITR-1 manual"
        url: "https://www.incometax.gov.in/iec/foportal/node/11455"
        authority_type: "official_guidance"
        notes: "Resident individual, up to Rs. 50 lakh, limited income heads."
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "Current AY 2026-27 portal guidance."

  - rule_id: "ITR1_EXCL_001"
    module: "itr_selection"
    title: "Exclude ITR-1 for RNOR or non-resident"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 210
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required: ["profile.residential_status"]
    when:
      ne:
        left: "profile.residential_status"
        right: "resident_ordinary"
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "RESIDENTIAL_STATUS_NOT_ROR"
      reason_code: "RESIDENTIAL_STATUS_NOT_ROR"
      severity: "info"
      terminal: false
    explanation_template: "ITR-1 is restricted to resident individuals other than RNOR."
    status: "active"
    rule_type: "exclusion"
    bundle_code: ""
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields: []
    produces_decision_fields:
      - "decision.itr1_eligible"
    source_refs:
      - source_id: "itr1_manual"
        label: "ITR-1 manual"
        url: "https://www.incometax.gov.in/iec/foportal/node/11455"
        authority_type: "official_guidance"
        notes: "RNOR and NRI excluded."

  - rule_id: "ITR1_EXCL_002"
    module: "itr_selection"
    title: "Exclude ITR-1 for foreign asset, signing authority, or foreign source income"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 211
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "profile.has_foreign_asset"
      - "profile.has_foreign_signing_authority"
      - "profile.has_foreign_source_income"
    when:
      any:
        - is_true: "profile.has_foreign_asset"
        - is_true: "profile.has_foreign_signing_authority"
        - is_true: "profile.has_foreign_source_income"
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "FOREIGN_ASSET_OR_FOREIGN_INCOME"
      reason_code: "FOREIGN_ASSET_OR_FOREIGN_INCOME"
      severity: "info"
      terminal: false
    explanation_template: "ITR-1 cannot be used where foreign assets, foreign signing authority, or foreign-source income exists."
    status: "active"
    rule_type: "exclusion"
    bundle_code: ""
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields: []
    produces_decision_fields:
      - "decision.itr1_eligible"
    source_refs:
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "Express ITR-1 exclusions."

  - rule_id: "ITR1_EXCL_003"
    module: "itr_selection"
    title: "Exclude ITR-1 for business/profession, disallowed capital gains, or multiple houses"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 212
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "income.business_or_profession_income"
      - "income.short_term_capital_gains"
      - "income.other_capital_gains_amount"
      - "income.ltcg_112a_amount"
      - "income.house_property_count"
    when:
      any:
        - gt:
            left: "income.business_or_profession_income"
            right: 0
        - gt:
            left: "income.short_term_capital_gains"
            right: 0
        - gt:
            left: "income.other_capital_gains_amount"
            right: 0
        - gt:
            left: "income.ltcg_112a_amount"
            right: 125000
        - gt:
            left: "income.house_property_count"
            right: 1
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "DISALLOWED_INCOME_HEAD_FOR_ITR1"
      reason_code: "DISALLOWED_INCOME_HEAD_FOR_ITR1"
      severity: "info"
      terminal: false
    explanation_template: "ITR-1 cannot be used for business/profession income, disallowed capital gains, or more than one house property."
    status: "active"
    rule_type: "exclusion"
    bundle_code: ""
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields: []
    produces_decision_fields:
      - "decision.itr1_eligible"
    source_refs:
      - source_id: "itr1_help"
        label: "How to file ITR-1"
        url: "https://www.incometax.gov.in/iec/foportal/help/how-to-file-itr1-form-sahaj"
        authority_type: "official_guidance"
        notes: "Income-head and house-property exclusions."
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "STCG and 112A threshold exclusions."

  - rule_id: "ITR1_EXCL_004"
    module: "itr_selection"
    title: "Exclude ITR-1 for director, unlisted shares, 194N, deferred ESOP, or carry-forward losses"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 213
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "profile.is_director_in_company"
      - "profile.held_unlisted_equity_shares"
      - "profile.tds_under_194n"
      - "profile.has_deferred_esop_tax"
      - "income.brought_forward_loss_exists"
      - "income.loss_to_carry_forward_exists"
    when:
      any:
        - is_true: "profile.is_director_in_company"
        - is_true: "profile.held_unlisted_equity_shares"
        - is_true: "profile.tds_under_194n"
        - is_true: "profile.has_deferred_esop_tax"
        - is_true: "income.brought_forward_loss_exists"
        - is_true: "income.loss_to_carry_forward_exists"
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "ITR1_STATUTORY_EXCLUSION_FLAG"
      reason_code: "ITR1_STATUTORY_EXCLUSION_FLAG"
      severity: "info"
      terminal: false
    explanation_template: "ITR-1 cannot be used for directors, holders of unlisted equity shares, section 194N cases, deferred ESOP tax cases, or carry-forward loss cases."
    status: "active"
    rule_type: "exclusion"
    bundle_code: ""
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields: []
    produces_decision_fields:
      - "decision.itr1_eligible"
    source_refs:
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "Current portal exclusions."
      - source_id: "itr1_manual"
        label: "ITR-1 manual"
        url: "https://www.incometax.gov.in/iec/foportal/node/11455"
        authority_type: "official_guidance"
        notes: "Parallel exclusion list."

  - rule_id: "ITR2_ELIG_001"
    module: "itr_selection"
    title: "Route to ITR-2 when not eligible for ITR-1 and no business/profession income exists"
    version: "2026.27.1"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 300
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2"]
    inputs_required:
      - "decision.itr1_eligible"
      - "income.business_or_profession_income"
      - "income.partnership_firm_interest_salary_bonus_commission"
    when:
      all:
        - eq:
            left: "decision.itr1_eligible"
            right: false
        - eq:
            left: "income.business_or_profession_income"
            right: 0
        - eq:
            left: "income.partnership_firm_interest_salary_bonus_commission"
            right: 0
    effect:
      decision_updates:
        - path: "eligible_forms"
          operation: "append_unique"
          value: "ITR-2"
        - path: "recommended_form"
          operation: "set"
          value: "ITR-2"
      reason_code: "ITR2_SELECTED"
      severity: "info"
      terminal: false
    explanation_template: "The taxpayer is not eligible for ITR-1 and has no business or profession income, so ITR-2 applies."
    status: "active"
    rule_type: "fallback"
    bundle_code: ""
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields:
      - "decision.itr1_eligible"
      - "decision.itr2_eligible"
    produces_decision_fields:
      - "decision.recommended_form"
    source_refs:
      - source_id: "itr2_help"
        label: "ITR-2 help"
        url: "https://www.incometax.gov.in/iec/foportal/help/all-topics/e-filing-services/itr-2"
        authority_type: "official_guidance"
        notes: "ITR-2 applies where ITR-1 is not available and business/profession income is absent."
      - source_id: "ay2026_salaried"
        label: "Salaried Individuals AY 2026-27"
        url: "https://www.incometax.gov.in/iec/foportal/help/individual/return-applicable-1"
        authority_type: "official_guidance"
        notes: "Current AY 2026-27 portal guidance."

  - rule_id: "ITRX_TEST_001"
    module: "itr_selection"
    title: "Route to synthetic ITR-X when more than one house property exists"
    version: "2026.27.test"
    effective_from_ay: "2026-27"
    effective_to_ay: null
    priority: 290
    taxpayer_scope:
      person_types: ["individual"]
      residential_statuses: ["resident_ordinary", "resident_not_ordinary", "non_resident", "deemed_resident_not_ordinary"]
      return_forms_in_scope: ["ITR-1", "ITR-2", "ITR-X"]
    inputs_required:
      - "income.house_property_count"
    when:
      gt:
        left: "income.house_property_count"
        right: 1
    effect:
      decision_updates:
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-1"
        - path: "ineligible_forms"
          operation: "append_unique"
          value: "ITR-2"
        - path: "itr1_eligible"
          operation: "set"
          value: false
        - path: "itr2_eligible"
          operation: "set"
          value: false
        - path: "itr1_ineligibility_reasons"
          operation: "append"
          value: "MULTIPLE_HOUSE_PROPERTIES"
        - path: "itr2_ineligibility_reasons"
          operation: "append"
          value: "SYNTHETIC_TEST_RULE_ITRX_REQUIRED"
        - path: "eligible_forms"
          operation: "append_unique"
          value: "ITR-X"
        - path: "recommended_form"
          operation: "set"
          value: "ITR-X"
      reason_code: "SYNTHETIC_TEST_RULE_ITRX_REQUIRED"
      severity: "info"
      terminal: false
    explanation_template: "Synthetic test rule: taxpayers with more than one house property must use ITR-X."
    status: "inactive"
    rule_type: "override"
    bundle_code: "synthetic_itrx_experiment"
    depends_on_rule_ids: []
    blocks_rule_ids: []
    requires_decision_fields:
      - "decision.itr1_eligible"
      - "decision.itr2_eligible"
    produces_decision_fields:
      - "decision.itr1_eligible"
      - "decision.itr2_eligible"
      - "decision.recommended_form"
    source_refs:
      - source_id: "synthetic_test_rule"
        label: "Synthetic test rule"
        url: "https://example.invalid/itrx-test-rule"
        authority_type: "internal_test_rule"
        notes: "Workflow validation rule only."
