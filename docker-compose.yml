services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "9010:9010"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-secret-key"
      DJANGO_ALLOWED_HOSTS: "*"
    volumes:
      - ./backend:/app
      - ./knowledge_base:/knowledge_base

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3011:3011"
    environment:
      API_BASE_URL: "http://backend:9010"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:9010"
    depends_on:
      - backend
